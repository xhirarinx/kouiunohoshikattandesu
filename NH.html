<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Combo Typer - Advanced Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        #game-wrapper {
            position: relative;
            width: 100vw;
            flex-grow: 1;
            background: #1e293b;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        canvas {
            display: block;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
        }

        .stats-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #combo-display {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            opacity: 0;
            transition: all 0.2s ease-out;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.8);
            pointer-events: none;
            z-index: 10;
        }

        .combo-active {
            opacity: 0.6 !important;
            transform: translate(-50%, -50%) scale(1.1) !important;
        }

        #keypad-container {
            width: 100vw;
            background: #0f172a;
            padding: 8px 5px env(safe-area-inset-bottom);
            border-top: 2px solid #334155;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease-in-out;
        }

        #keypad-container.hidden-keypad {
            display: none;
        }

        #keypad {
            display: grid;
            grid-template-columns: 1.5fr repeat(10, 1fr) 1.5fr;
            gap: 4px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 5px;
        }

        .key {
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #f8fafc;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .key:active {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(0.9);
        }

        .key-control {
            font-size: 0.7rem;
            background: rgba(30, 41, 59, 1);
            color: #94a3b8;
        }

        #toggle-visibility-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 4px 0;
            background: #0f172a;
        }

        #toggle-visibility-btn {
            font-size: 11px;
            color: #64748b;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 5px 10px;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
            text-align: center;
        }

        .btn {
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 30px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            margin-top: 15px;
        }

        .slow-mode {
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3) inset;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ui-layer">
            <div class="stats-card">
                <div class="text-[10px] opacity-70 leading-tight">SCORE</div>
                <div id="score" class="text-xl font-bold text-sky-400 leading-none">0</div>
            </div>
            <div class="stats-card text-right">
                <div class="text-[10px] opacity-70 leading-tight">COMBO</div>
                <div id="current-combo" class="text-xl font-bold text-yellow-400 leading-none">0</div>
            </div>
        </div>

        <div id="combo-display">0</div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay">
            <h1 id="overlay-title" class="text-3xl font-extrabold mb-2 text-white italic tracking-tighter">NUMBER COMBO</h1>
            <div id="best-score-container" class="mb-4 text-yellow-400 font-bold text-lg">
                BEST: <span id="best-score">0</span>
            </div>
            <p id="message" class="text-sm opacity-80 mb-6 leading-relaxed">
                同じ数字を連続で打ってコンボ！<br>
                </p>
            <div id="overlay-buttons" class="flex flex-col gap-3">
                <button id="startBtn" class="btn">START GAME</button>
                <button id="backToTitleBtn" class="btn bg-transparent border-2 border-slate-500 text-slate-300" style="display: none;">TITLE</button>
            </div>
        </div>
    </div>

    <div id="keypad-container">
        <div id="keypad">
            <div id="pauseBtn" class="key key-control" onclick="togglePause()">PAUSE</div>
            <div class="key" onclick="handleInput('1')">1</div>
            <div class="key" onclick="handleInput('2')">2</div>
            <div class="key" onclick="handleInput('3')">3</div>
            <div class="key" onclick="handleInput('4')">4</div>
            <div class="key" onclick="handleInput('5')">5</div>
            <div class="key" onclick="handleInput('6')">6</div>
            <div class="key" onclick="handleInput('7')">7</div>
            <div class="key" onclick="handleInput('8')">8</div>
            <div class="key" onclick="handleInput('9')">9</div>
            <div class="key" onclick="handleInput('0')">0</div>
            <div id="retryBtn" class="key key-control opacity-30 cursor-not-allowed" onclick="handleRetry()">RETRY</div>
        </div>
    </div>
    
    <div id="toggle-visibility-wrapper">
        <button id="toggle-visibility-btn" onclick="toggleKeypad()">キーパッドを隠す (PCユーザー向け)</button>
    </div>

    <script>
        const wrapper = document.getElementById('game-wrapper');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('current-combo');
        const bestScoreEl = document.getElementById('best-score');
        const comboDisplay = document.getElementById('combo-display');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const startBtn = document.getElementById('startBtn');
        const backToTitleBtn = document.getElementById('backToTitleBtn');
        const messageEl = document.getElementById('message');
        const pauseBtn = document.getElementById('pauseBtn');
        const retryBtn = document.getElementById('retryBtn');
        const keypadContainer = document.getElementById('keypad-container');
        const toggleBtn = document.getElementById('toggle-visibility-btn');

        let score = 0;
        let comboCount = 0;
        let lastChar = null;
        let numbers = [];
        let gameActive = false;
        let isPaused = false;
        let spawnTimer = 0;
        let noInputTimer = 0;
        let bestScore = parseInt(localStorage.getItem('numCombo_bestScore')) || 0;
        let isKeypadVisible = true;
        
        const INITIAL_SPEED = 0.5;
        const SPEED_INCREMENT = 0.00003;
        const ROTATION_THRESHOLD = 10000;
        
        let difficulty = 1;
        let slowTimeFactor = 1.0;

        const COMBO_POINTS = { 1: 1, 2: 5, 3: 20, 4: 200, 5: 2000 };

        bestScoreEl.innerText = bestScore.toLocaleString();

        function resize() {
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }

        function toggleKeypad() {
            isKeypadVisible = !isKeypadVisible;
            if (isKeypadVisible) {
                keypadContainer.classList.remove('hidden-keypad');
                toggleBtn.innerText = "キーパッドを隠す (PCユーザー向け)";
            } else {
                keypadContainer.classList.add('hidden-keypad');
                toggleBtn.innerText = "キーパッドを表示する (モバイル向け)";
            }
            // リサイズを遅延実行してレイアウト確定後にキャンバスサイズを合わせる
            setTimeout(resize, 50);
        }

        window.addEventListener('resize', resize);
        resize();

        class FallingNumber {
            constructor() {
                this.value = Math.floor(Math.random() * 10).toString();
                this.size = Math.min(canvas.width / 10, 40) + Math.random() * 10;
                this.x = Math.random() * (canvas.width - this.size * 2) + this.size;
                this.y = -50;
                this.baseSpeed = (Math.random() * 0.4 + INITIAL_SPEED);
                this.color = `hsl(${Math.random() * 360}, 80%, 70%)`;
                
                // 生成時のスコアに基づいて回転を決める
                this.rotation = score >= ROTATION_THRESHOLD ? (Math.random() - 0.5) * 0.2 : 0;
                this.angle = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.font = `bold ${this.size}px 'JetBrains Mono'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 6;
                ctx.strokeText(this.value, 0, 0);

                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillText(this.value, 0, 0);
                
                ctx.restore();
            }

            update() {
                if (isPaused) return;
                this.y += this.baseSpeed * difficulty * slowTimeFactor;
                this.angle += this.rotation * slowTimeFactor;
                
                if (this.y > canvas.height + this.size) {
                    gameOver();
                }
            }
        }

        function spawnNumber() {
            numbers.push(new FallingNumber());
        }

        function togglePause() {
            if (!gameActive) return;
            isPaused = !isPaused;
            
            if (isPaused) {
                pauseBtn.innerText = "RESUME";
                retryBtn.classList.remove('opacity-30', 'cursor-not-allowed');
                overlay.style.display = 'flex';
                overlayTitle.innerText = "PAUSED";
                startBtn.innerText = "RESUME GAME";
                backToTitleBtn.style.display = 'block';
            } else {
                pauseBtn.innerText = "PAUSE";
                retryBtn.classList.add('opacity-30', 'cursor-not-allowed');
                overlay.style.display = 'none';
                backToTitleBtn.style.display = 'none';
            }
        }

        function handleRetry() {
            if (isPaused || !gameActive) {
                resetGame();
            }
        }

        function handleInput(key) {
            if (!gameActive || isPaused) return;
            if (!/^[0-9]$/.test(key)) return;

            const targetIndex = numbers.findIndex(n => n.value === key);

            if (targetIndex !== -1) {
                const target = numbers[targetIndex];
                noInputTimer = 0;

                if (key === lastChar) {
                    comboCount++;
                } else {
                    comboCount = 1;
                }

                const points = COMBO_POINTS[Math.min(comboCount, 5)] || 2000;
                score += points;
                lastChar = key;

                scoreEl.innerText = score.toLocaleString();
                comboEl.innerText = comboCount;
                
                if (comboCount >= 2) {
                    slowTimeFactor = Math.max(0.35, 1.1 - (comboCount * 0.15));
                    wrapper.classList.add('slow-mode');
                    comboDisplay.innerText = `${comboCount} COMBO`;
                    comboDisplay.classList.add('combo-active');
                    setTimeout(() => comboDisplay.classList.remove('combo-active'), 300);
                } else {
                    slowTimeFactor = 1.0;
                    wrapper.classList.remove('slow-mode');
                }
                numbers.splice(targetIndex, 1);
            } else {
                score = Math.max(0, score - 20);
                scoreEl.innerText = score.toLocaleString();
                comboCount = 0;
                comboEl.innerText = comboCount;
                lastChar = null;
                slowTimeFactor = 1.0;
                wrapper.classList.remove('slow-mode');
            }
        }

        function gameOver() {
            gameActive = false;
            isPaused = false;
            wrapper.classList.remove('slow-mode');
            overlay.style.display = 'flex';
            overlayTitle.innerText = "GAME OVER";

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('numCombo_bestScore', bestScore);
                bestScoreEl.innerText = bestScore.toLocaleString();
                messageEl.innerHTML = `<span class="text-yellow-400 font-bold text-xl">NEW BEST!</span><br>スコア: ${score.toLocaleString()}`;
            } else {
                messageEl.innerHTML = `スコア: ${score.toLocaleString()}<br>コンボを繋いでハイスコア！`;
            }

            startBtn.innerText = 'PLAY AGAIN';
            backToTitleBtn.style.display = 'block';
            retryBtn.classList.remove('opacity-30', 'cursor-not-allowed');
        }

        function showTitleScreen() {
            gameActive = false;
            isPaused = false;
            numbers = [];
            score = 0;
            comboCount = 0;
            scoreEl.innerText = '0';
            comboEl.innerText = '0';
            wrapper.classList.remove('slow-mode');
            overlay.style.display = 'flex';
            overlayTitle.innerText = "NUMBER COMBO";
            messageEl.innerHTML = `同じ数字を連続で打ってコンボ！<br>10,000点を超えると数字が回転し始める...`;
            startBtn.innerText = 'START GAME';
            backToTitleBtn.style.display = 'none';
            retryBtn.classList.add('opacity-30', 'cursor-not-allowed');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function resetGame() {
            score = 0;
            comboCount = 0;
            lastChar = null;
            numbers = [];
            difficulty = 1;
            slowTimeFactor = 1.0;
            spawnTimer = 0;
            noInputTimer = 0;
            isPaused = false;
            scoreEl.innerText = '0';
            comboEl.innerText = '0';
            overlay.style.display = 'none';
            backToTitleBtn.style.display = 'none';
            wrapper.classList.remove('slow-mode');
            gameActive = true;
            retryBtn.classList.add('opacity-30', 'cursor-not-allowed');

            resize();
            for(let i=0; i<3; i++) spawnNumber();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameActive && !isPaused) {
                difficulty += SPEED_INCREMENT;
                spawnTimer++;
                noInputTimer++;

                const spawnRate = Math.max(40, (100 - (difficulty * 3)) / slowTimeFactor);
                const maxNumbers = comboCount >= 4 ? 8 : 5;
                
                if (numbers.length < maxNumbers || spawnTimer > spawnRate) {
                    if (numbers.length < maxNumbers) {
                        spawnNumber();
                    }
                    spawnTimer = 0;
                }

                if (numbers.length >= 8 && noInputTimer >= 180) {
                    spawnNumber();
                    noInputTimer = 0;
                }
            }

            for (let i = numbers.length - 1; i >= 0; i--) {
                numbers[i].update();
                numbers[i].draw();
            }

            requestAnimationFrame(update);
        }

        startBtn.addEventListener('click', () => {
            if (gameActive && isPaused) {
                togglePause();
            } else {
                resetGame();
            }
        });

        backToTitleBtn.addEventListener('click', showTitleScreen);

        window.addEventListener('keydown', (e) => {
            if (e.key === "p" || e.key === "Escape" || e.key === " ") {
                if (e.key === " ") e.preventDefault();
                togglePause();
            }
            if (e.key === "r" && (isPaused || !gameActive)) {
                handleRetry();
            }
            handleInput(e.key);
        });

        requestAnimationFrame(update);
    </script>
</body>
</html>
